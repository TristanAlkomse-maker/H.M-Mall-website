<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%8D%EF%B8%8F%3C/text%3E%3C/svg%3E">
<meta name="description" content="عروض وتخفيضات إتش إم مول — أفضل الصفقات من محلات المول.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عروض وتخفيضات – إتش إم مول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-light:#E8CC7A;--gold-dark:#9A7A2E;--gold-pale:#F7F0DC;
  --brown:#3E2A1A;--brown-mid:#6B4226;--brown-light:#A0714F;
  --white:#FDFAF4;--off-white:#F2ECD9;--text-dark:#1E1209;
  --border:rgba(201,168,76,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--text-dark);color:var(--white);direction:rtl;min-height:100vh;}

/* NAV */
nav{
  background:rgba(30,18,9,0.95);backdrop-filter:blur(14px);
  padding:0 5%;display:flex;align-items:center;justify-content:space-between;
  height:64px;position:sticky;top:0;z-index:100;
  border-bottom:2px solid var(--gold);
}
.logo{font-size:1.4rem;font-weight:900;color:var(--gold);text-decoration:none;}
.logo span{color:var(--white);font-weight:300;}
.back-btn{
  display:flex;align-items:center;gap:6px;
  color:rgba(253,250,244,0.6);text-decoration:none;font-size:0.85rem;
  transition:color 0.2s;
}
.back-btn:hover{color:var(--gold);}

/* HERO */
.offers-hero{
  background:linear-gradient(135deg,var(--brown) 0%,#5A2A10 50%,var(--brown-mid) 100%);
  padding:4rem 5% 3rem;text-align:center;position:relative;overflow:hidden;
}
.offers-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(201,168,76,0.15) 0%,transparent 65%);
}
.offers-hero::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(-55deg,transparent,transparent 60px,rgba(201,168,76,0.02) 60px,rgba(201,168,76,0.02) 61px);
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);
  color:var(--gold-light);font-size:0.75rem;font-weight:700;letter-spacing:0.15em;
  padding:7px 22px;border-radius:50px;margin-bottom:1.2rem;position:relative;z-index:1;
}
.offers-hero h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,8vw,6rem);color:var(--white);
  letter-spacing:0.06em;line-height:0.95;position:relative;z-index:1;margin-bottom:0.8rem;
}
.offers-hero h1 em{color:var(--gold);font-style:normal;}
.offers-hero p{
  color:rgba(253,250,244,0.55);font-size:0.95rem;font-weight:300;
  position:relative;z-index:1;
}
.offers-count{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--gold);color:var(--brown);
  font-size:0.85rem;font-weight:800;padding:8px 24px;border-radius:50px;
  margin-top:1.5rem;position:relative;z-index:1;
}

/* OFFERS GRID */
.offers-body{max-width:900px;margin:0 auto;padding:3rem 5%;}
.section-label{
  font-size:0.72rem;font-weight:800;letter-spacing:0.2em;color:var(--gold);
  margin-bottom:0.5rem;
}
.section-title{
  font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--white);
  letter-spacing:0.05em;margin-bottom:2rem;
}

.offer-card-big{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(201,168,76,0.18);
  border-radius:16px;overflow:hidden;
  display:grid;grid-template-columns:180px 1fr;
  margin-bottom:1.2rem;position:relative;
  transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
}
.offer-card-big:hover{
  transform:translateY(-3px);
  box-shadow:0 16px 40px rgba(0,0,0,0.4);
  border-color:rgba(201,168,76,0.45);
}
.offer-card-left{
  background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  padding:1.5rem;border-left:1px solid rgba(201,168,76,0.12);
  min-height:160px;
}
.offer-logo{max-width:130px;max-height:100px;object-fit:contain;}
.offer-icon{font-size:3rem;}
.offer-card-right{padding:1.5rem 1.8rem;display:flex;flex-direction:column;justify-content:center;}
.offer-cat{
  font-size:0.65rem;font-weight:800;letter-spacing:0.18em;color:var(--gold);
  margin-bottom:0.4rem;text-transform:uppercase;
}
.offer-shop-name{font-size:1.4rem;font-weight:900;color:var(--white);margin-bottom:0.4rem;}
.offer-desc{font-size:0.88rem;color:rgba(253,250,244,0.55);line-height:1.6;margin-bottom:1rem;}
.offer-footer-row{display:flex;align-items:center;gap:1rem;}
.offer-pct-badge{
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--gold);
  line-height:1;text-shadow:0 0 20px rgba(201,168,76,0.4);
}
.offer-validity{
  font-size:0.72rem;color:rgba(253,250,244,0.35);
  border:1px solid rgba(201,168,76,0.2);padding:4px 12px;border-radius:50px;
}
.offer-ribbon{
  position:absolute;top:14px;left:14px;
  background:var(--gold);color:var(--brown);
  font-size:0.65rem;font-weight:800;letter-spacing:0.1em;
  padding:4px 12px;border-radius:50px;
}

/* FOOTER */
footer{
  background:#0D0806;border-top:1px solid rgba(201,168,76,0.15);
  padding:2rem 5%;display:flex;align-items:center;justify-content:space-between;
  font-size:0.82rem;margin-top:2rem;
}
.f-logo{font-size:1rem;font-weight:900;color:var(--gold);}
.f-logo span{color:var(--white);font-weight:300;}
footer p{color:rgba(253,250,244,0.3);}
footer a{color:var(--gold);text-decoration:none;font-size:0.82rem;}

@media(max-width:640px){
  .offer-card-big{grid-template-columns:1fr;}
  .offer-card-left{min-height:120px;border-left:none;border-bottom:1px solid rgba(201,168,76,0.12);}
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="youth-fashion-v2.html">إتش إم <span>مول</span></a>
  <a class="back-btn" href="youth-fashion-v2.html">← العودة للرئيسية</a>
</nav>

<div class="offers-hero">
  <div class="hero-badge">🏷️ عروض حصرية</div>
  <h1>عروض<br><em>وتخفيضات</em></h1>
  <p>أفضل الصفقات من محلات إتش إم مول — لا تفوّتها!</p>
  <div class="offers-count" id="offersCountBadge">✦ 5 محلات مشاركة في العروض ✦</div>
</div>

<div class="offers-body">
  <p class="section-label">EXCLUSIVE DEALS</p>
  <h2 class="section-title">المحلات المشاركة</h2>
  <div id="offersContainer"></div>
</div>


<footer>
  <div class="f-logo">إتش إم <span>مول</span></div>
  <p>© 2026 جميع الحقوق محفوظة</p>
  <a href="youth-fashion-v2.html">← العودة للرئيسية</a>
</footer>


<!-- ═══ Supabase data layer (shared database) ═══ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  window.SB_URL = 'https://lmiodxtfnfudixtdxpwo.supabase.co';
  window.SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxtaW9keHRmbmZ1ZGl4dGR4cHdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjgxNjIsImV4cCI6MjA5Njk0NDE2Mn0.E1r9ECpY_XppMw7mrnHGVlMMYQkcu-tttSOfQ0nIaM0';
  window.sb = (window.supabase && window.supabase.createClient)
    ? window.supabase.createClient(window.SB_URL, window.SB_KEY) : null;
  async function sbSyncOffersToCache(){
    if(!window.sb) return false;
    try{
      var res = await window.sb.from('offers').select('*');
      if(res.error){ console.warn('sb offers read', res.error); return false; }
      localStorage.setItem('hm_offers_live', JSON.stringify(res.data||[]));
      return true;

</script>

<script>
/* ════════════════════════════════════════
   OFFERS PAGE — reads live data from admin
════════════════════════════════════════ */

// Default offers (fallback if admin hasn't saved anything)
var defaultOffers = [
  {id:1,  name:'SOLO FASHION',          discount:30, duration:'', cat:'ملابس شبابية'},
  {id:2,  name:'MADI',                  discount:25, duration:'', cat:'ملابس وأحذية'},
  {id:11, name:'أبوظهير للأحذية',        discount:40, duration:'', cat:'أحذية'},
  {id:16, name:'Uomo Cavaliere',         discount:20, duration:'', cat:'ملابس راقية'},
  {id:30, name:'ESLAM STORE',            discount:35, duration:'', cat:'ملابس رجالية'},
];

function getOffers() {
  try {
    var live = localStorage.getItem('hm_offers_live');
    if (live) {
      var parsed = JSON.parse(live);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return defaultOffers;
}

function getLogo(id) {
  try {
    var imgs = JSON.parse(localStorage.getItem('hm_shop_logos') || '{}');
    return imgs[id] || null;
  } catch(e) { return null; }
}

function formatDate(dateStr) {
  if (!dateStr) return 'ساري المفعول';
  try {
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) return 'ساري المفعول';
    return 'حتى ' + d.toLocaleDateString('ar-LY', {day:'numeric', month:'long', year:'numeric'});
  } catch(e) { return 'ساري المفعول'; }
}

function isExpired(dateStr) {
  if (!dateStr) return false;
  try { return new Date(dateStr) < new Date(); } catch(e) { return false; }
}

function renderOffers() {
  var offers = getOffers();
  var container = document.getElementById('offersContainer');
  var countBadge = document.getElementById('offersCountBadge');

  // Filter out expired
  var active = offers.filter(function(o) { return !isExpired(o.duration); });
  var expired = offers.filter(function(o) { return isExpired(o.duration); });

  if (countBadge) countBadge.textContent = '✦ ' + active.length + ' محلات مشاركة في العروض ✦';

  if (!active.length && !expired.length) {
    container.innerHTML = '<div style="text-align:center;padding:4rem;color:rgba(253,250,244,0.3);"><div style="font-size:3rem;margin-bottom:1rem;">🏷️</div><p>لا توجد عروض نشطة حالياً</p></div>';
    return;
  }

  var html = '';

  if (active.length) {
    html += active.map(function(o) {
      var logo = getLogo(o.id);
      var logoHtml = logo
        ? '<img src="'+logo+'" alt="'+o.name+'" class="offer-logo">'
        : '<div class="offer-icon-fallback">🏷️</div>';
      var dateLabel = formatDate(o.duration);
      return '<div class="offer-card-big">'+
        '<div class="offer-card-left">'+
          '<div class="offer-logo-wrap">'+logoHtml+'</div>'+
        '</div>'+
        '<div class="offer-card-right">'+
          '<div class="offer-cat">'+(o.cat||'ملابس شبابية')+'</div>'+
          '<div class="offer-shop-name">'+o.name+'</div>'+
          '<div class="offer-desc">تخفيض خاص على جميع منتجات المحل</div>'+
          '<div class="offer-footer-row">'+
            '<div class="offer-pct-badge">'+o.discount+'%</div>'+
            '<div class="offer-validity">'+dateLabel+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="offer-ribbon">عرض خاص</div>'+
      '</div>';
    }).join('');
  }

  if (expired.length) {
    html += '<div style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,0.06);">';
    html += '<p style="font-size:0.72rem;font-weight:700;letter-spacing:0.15em;color:rgba(253,250,244,0.25);margin-bottom:1rem;">EXPIRED — عروض منتهية</p>';
    html += expired.map(function(o) {
      return '<div class="offer-card-big" style="opacity:0.35;filter:grayscale(0.5);">'+
        '<div class="offer-card-left"><div class="offer-icon-fallback">🏷️</div></div>'+
        '<div class="offer-card-right">'+
          '<div class="offer-cat">انتهى العرض</div>'+
          '<div class="offer-shop-name">'+o.name+'</div>'+
          '<div class="offer-footer-row">'+
            '<div class="offer-pct-badge" style="color:rgba(253,250,244,0.4)">'+o.discount+'%</div>'+
            '<div class="offer-validity">انتهى '+formatDate(o.duration)+'</div>'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
    html += '</div>';
  }

  container.innerHTML = html;
}

/* Extra CSS for fallback icon */
(function() {
  var s = document.createElement('style');
  s.textContent = '.offer-icon-fallback{font-size:3rem;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}';
  document.head.appendChild(s);
})();

// Render on load — paint immediately, then refresh from the shared database
renderOffers();
var __lastOffersHash = localStorage.getItem('hm_offers_live') || '';
sbSyncOffersToCache().then(function(ok){
  if(ok){ __lastOffersHash = localStorage.getItem('hm_offers_live') || ''; renderOffers(); }
});
setInterval(function(){
  sbSyncOffersToCache().then(function(ok){
    if(!ok) return;
    var cur = localStorage.getItem('hm_offers_live') || '';
    if(cur !== __lastOffersHash){ __lastOffersHash = cur; renderOffers(); }
  });
}, 8000);

// Live update — poll localStorage every 2 seconds for admin changes
var lastUpdated = localStorage.getItem('hm_offers_updated') || '0';
setInterval(function() {
  var current = localStorage.getItem('hm_offers_updated') || '0';
  if (current !== lastUpdated) {
    lastUpdated = current;
    renderOffers();
    // Show subtle notification
    var toast = document.getElementById('updateToast');
    if (toast) {
      toast.style.opacity = '1';
      setTimeout(function(){ toast.style.opacity='0'; }, 2500);
    }
  }
}, 2000);
</script>

<!-- Live update toast -->
<div id="updateToast" style="position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--brown-mid,#6B4226);border:1px solid rgba(201,168,76,0.4);color:rgba(253,250,244,0.9);font-family:Cairo,sans-serif;font-size:0.8rem;font-weight:700;padding:8px 24px;border-radius:50px;opacity:0;transition:opacity 0.4s;pointer-events:none;z-index:100;">
  ✓ تم تحديث العروض
</div>
</body>
</html>
